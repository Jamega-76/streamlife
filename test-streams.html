<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Test</title>
    <style>
        body {
            background: #131313;
            color: #e5e2e1;
            font-family: Inter, sans-serif;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { color: #b2c5ff; }
        .test-item {
            background: #1c1b1b;
            padding: 20px;
            margin: 20px 0;
            border-radius: 12px;
            border: 1px solid #353534;
        }
        .stream-name {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            background: #b2c5ff;
            color: #002b74;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        .status {
            font-size: 12px;
            color: #8c909d;
            margin-top: 10px;
        }
        .error { color: #ffb4ab; }
        .success { color: #90ee90; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎙️ StreamLife - Stream Test</h1>
    <p>Test each stream to see if they load and play correctly.</p>
    <div id="test-list"></div>
</div>

<script>
    const streams = [
        { name: 'Europe 2 New', url: 'https://wr.lmn.fm/vr-wr1.mp3' },
        { name: 'Europe 2 Classics', url: 'https://wr.lmn.fm/vr-wr2.mp3' },
        { name: 'Europe 2 Acoustic', url: 'https://wr.lmn.fm/vr-wr3.mp3' },
        { name: 'Europe 2 Hits', url: 'https://wr.lmn.fm/vr-wr4.mp3' },
        { name: 'Europe 2 Rock', url: 'https://wr.lmn.fm/vr-wr5.mp3' },
    ];

    const audioInstances = {};

    function createTestItem(stream, index) {
        return `
            <div class="test-item">
                <div class="stream-name">${stream.name}</div>
                <div style="font-size: 12px; word-break: break-all; color: #8c909d;">
                    ${stream.url}
                </div>
                <div class="controls">
                    <button onclick="testStream(${index})">Test Play</button>
                    <button onclick="stopStream(${index})">Stop</button>
                </div>
                <div class="status" id="status-${index}">Ready</div>
            </div>
        `;
    }

    function testStream(index) {
        const stream = streams[index];
        const statusEl = document.getElementById(`status-${index}`);

        // Stop any existing audio
        if (audioInstances[index]) {
            audioInstances[index].pause();
        }

        const audio = new Audio();
        audio.crossOrigin = 'anonymous';
        audioInstances[index] = audio;

        statusEl.textContent = '⏳ Loading...';
        statusEl.className = 'status';

        audio.addEventListener('loadstart', () => {
            statusEl.textContent = '⏳ Connecting...';
        });

        audio.addEventListener('canplay', () => {
            statusEl.textContent = '✅ Playing successfully!';
            statusEl.className = 'status success';
        });

        audio.addEventListener('playing', () => {
            statusEl.textContent = '▶️ Playing...';
            statusEl.className = 'status success';
        });

        audio.addEventListener('error', (e) => {
            const error = audio.error;
            let msg = '❌ Error: ';
            if (error.code === error.MEDIA_ERR_ABORTED) msg += 'Aborted';
            else if (error.code === error.MEDIA_ERR_NETWORK) msg += 'Network Error (CORS?)';
            else if (error.code === error.MEDIA_ERR_DECODE) msg += 'Decode Error';
            else if (error.code === error.MEDIA_ERR_SRC_NOT_SUPPORTED) msg += 'Format not supported';
            else msg += 'Unknown error';

            statusEl.textContent = msg;
            statusEl.className = 'status error';
            console.error('Stream error:', error);
        });

        audio.addEventListener('pause', () => {
            if (!statusEl.textContent.includes('Playing')) {
                statusEl.textContent = '⏸️ Paused';
                statusEl.className = 'status';
            }
        });

        audio.src = stream.url;

        audio.play().catch(err => {
            statusEl.textContent = `❌ Playback Error: ${err.message}`;
            statusEl.className = 'status error';
            console.error('Playback error:', err);
        });
    }

    function stopStream(index) {
        const statusEl = document.getElementById(`status-${index}`);
        if (audioInstances[index]) {
            audioInstances[index].pause();
            audioInstances[index].currentTime = 0;
        }
        statusEl.textContent = '⏹️ Stopped';
        statusEl.className = 'status';
    }

    // Generate test items
    document.getElementById('test-list').innerHTML = streams
        .map((stream, idx) => createTestItem(stream, idx))
        .join('');
</script>
</body>
</html>
